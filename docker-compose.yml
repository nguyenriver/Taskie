
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: taskie-db-server
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:?SA_PASSWORD must be set in .env}"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  init-db:
    image: mcr.microsoft.com/mssql-tools
    container_name: taskie-db-initializer
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./docs/Taskie.sql:/usr/config/Taskie.sql
    environment:
      SA_PASSWORD: "${SA_PASSWORD:?SA_PASSWORD must be set in .env}"
    entrypoint: /bin/bash -c "
      set -e;
      echo 'SQL Server is ready. Running schema script...';
      database_exists=$$(/opt/mssql-tools/bin/sqlcmd -S db -U sa -P \"$${SA_PASSWORD}\" -h -1 -W -Q \"SET NOCOUNT ON; SELECT CASE WHEN DB_ID(N'TaskieDB') IS NULL THEN 0 ELSE 1 END\" | tr -d '[:space:]');
      if [ \"$${database_exists}\" = \"0\" ]; then
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P \"$${SA_PASSWORD}\" -i /usr/config/Taskie.sql;
        echo 'Database initialization complete.';
      else
        echo 'TaskieDB already exists. Skipping initialization to preserve data.';
      fi;
      "

  db-reset:
    image: mcr.microsoft.com/mssql-tools
    profiles: ["reset"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      SA_PASSWORD: "${SA_PASSWORD:?SA_PASSWORD must be set in .env}"
    entrypoint: /bin/bash -c "
      set -e;
      echo 'Resetting TaskieDB...';
      /opt/mssql-tools/bin/sqlcmd -S db -U sa -P \"$${SA_PASSWORD}\" -Q \"IF DB_ID(N'TaskieDB') IS NOT NULL BEGIN ALTER DATABASE [TaskieDB] SET SINGLE_USER WITH ROLLBACK IMMEDIATE; DROP DATABASE [TaskieDB]; END\";
      echo 'TaskieDB reset complete.';
      "

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskie-backend-api
    ports:
      - "5199:5199"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=TaskieDB;User Id=sa;Password=${SA_PASSWORD:?SA_PASSWORD must be set in .env};TrustServerCertificate=True"
      Jwt__Key: "${JWT_KEY:?JWT_KEY must be set in .env}"
      Jwt__Issuer: "${JWT_ISSUER:-TaskieAPI}"
      Jwt__Audience: "${JWT_AUDIENCE:-TaskieClient}"
      Cors__AllowedOrigins: "${CORS_ALLOWED_ORIGINS:-http://localhost:5173}"
    depends_on:
      db:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:5199/api}"
    container_name: taskie-frontend-app
    ports:
      - "5173:80"
    depends_on:
      - backend
